name: Deploy docs to GitHub Pages

# Actions-based Pages deploy. DISABLED on push (manual dispatch only) because the
# actions/deploy-pages@v4 step kept wedging on GitHub's Pages backend (Node 20->24 rollout
# degradation, mid-2026) — three consecutive push-triggered runs failed at "Deploy to Pages".
# The site is now served via **Deploy from a branch** (Settings -> Pages -> Source = main /docs);
# docs/.nojekyll makes that path skip Jekyll and just upload the static files. Keeping this
# workflow around (dispatch-only) so we can switch back to Actions deploy if GitHub stabilises,
# without it generating failed-run noise on every push.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
